<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" integrity="sha384-NZLkVuBRMEeB4VeZz27WwTRvlhec30biQ8Xx7zG7JJnkvEKRg5qi6BNbEXo9ydwv" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js" integrity="sha384-JP5UPxIO2Tm2o79Fb0tGYMa44jkWar53aBoCbd8ah0+LcCDoohTIYr+zIXyfGIJN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="#/" class="navbar-brand" id="nav-brand">Territory Cards</a>
      <div class="navbar-actions">
        <a href="#/print" class="btn btn-secondary btn-sm" id="nav-print">Print All</a>
        <button id="btn-load" class="btn btn-secondary btn-sm">Load JSON</button>
        <button id="btn-save" class="btn btn-secondary btn-sm">Save JSON</button>
        <button id="btn-import-kml" class="btn btn-secondary btn-sm">Import KML</button>
        <button id="btn-reset" class="btn-navbar-text">Reset</button>
        <div id="lang-switcher" class="lang-switcher"></div>
        <input type="file" id="file-input" accept=".json" style="display:none" />
        <input type="file" id="kml-input" accept=".kml,.kmz" style="display:none" />
      </div>
    </div>
  </nav>
  <div class="container" id="app"></div>

  <!-- i18n (must load BEFORE all other app JS) -->
  <script src="js/i18n/es.js"></script>
  <script src="js/i18n/en.js"></script>
  <script src="js/i18n/i18n.js"></script>

  <!-- All JS as plain scripts (NOT modules — modules are blocked on file:// by CORS) -->
  <script src="js/utils/helpers.js"></script>
  <script src="js/store.js"></script>
  <script src="js/utils/kml-import.js"></script>
  <script src="js/components/map.js"></script>
  <script src="js/components/card-map.js"></script>
  <script src="js/components/polygon-draw.js"></script>
  <script src="js/views/index.js"></script>
  <script src="js/views/show.js"></script>
  <script src="js/views/form.js"></script>
  <script src="js/views/card.js"></script>
  <script src="js/views/print.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
