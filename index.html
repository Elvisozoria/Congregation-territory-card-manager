<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <script>
    // Apply theme before render to avoid flash
    (function() {
      var theme = 'dark';
      try { theme = localStorage.getItem('territory-cards-theme') || 'dark'; } catch(e) {}
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="#/" class="navbar-brand" id="nav-brand">Territory Cards</a>
      <div class="navbar-actions">
        <div id="lang-switcher" class="lang-switcher"></div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme"></button>
        <div class="navbar-separator"></div>
        <a href="#/print" class="btn btn-secondary btn-sm" id="nav-print">Print All</a>
        <div id="more-menu-wrapper" class="more-menu-wrapper">
          <button id="more-toggle" class="more-toggle" title="More options">&#8943;</button>
          <div id="more-menu" class="more-menu"></div>
        </div>
        <input type="file" id="file-input" accept=".json" style="display:none" />
        <input type="file" id="kml-input" accept=".kml,.kmz" style="display:none" />
      </div>
    </div>
  </nav>
  <div class="container" id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
